<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>My Links</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9ecf, #ffc3e6, #ffd6f0);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    color: #fff;
}

/* Карточка с анимацией появления */
.card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    width: 300px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s ease;
    z-index: 2;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Ава */
.avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin-bottom: 20px;
    border: 3px solid white;
    object-fit: cover;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

/* Кнопки */
.btn {
    display: block;
    margin: 10px 0;
    padding: 12px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.instagram { background: #E1306C; }
.tiktok { background: #000; }
.telegram { background: #2AABEE; }

.btn:hover {
    transform: scale(1.08);
    opacity: 0.9;
}

/* ❤️ Сердечки */
.heart {
    position: absolute;
    top: -50px;
    font-size: 20px;
    animation: fall linear infinite;
    color: #ff4da6;
    opacity: 0.8;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}
</style>
</head>

<body>

<!-- Сердечки -->
<div class="heart" style="left:10%; animation-duration:6s;">❤️</div>
<div class="heart" style="left:20%; animation-duration:8s;">💖</div>
<div class="heart" style="left:35%; animation-duration:7s;">💕</div>
<div class="heart" style="left:50%; animation-duration:9s;">💗</div>
<div class="heart" style="left:65%; animation-duration:6s;">💞</div>
<div class="heart" style="left:80%; animation-duration:8s;">💘</div>
<div class="heart" style="left:90%; animation-duration:7s;">❤️</div>

<div class="card">
    <img src="https://i.pinimg.com/236x/eb/a6/84/eba684cf1b67c0b6316d77af426d2c9b.jpg" class="avatar">

    <a href="https://www.instagram.com/nastyakulish39" class="btn instagram">Instagram</a>
    <a href="https://tiktok.com/@nasty2765" class="btn tiktok">TikTok</a>
    <a href="https://t.me/qqqidjd" class="btn telegram">Telegram</a>
</div>

</body>
</html>
